services:
  - type: web
    name: breathe-esg
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: breathe-esg.onrender.com,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-i3e9.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://breathe-esg-i3e9.onrender.com

databases:
  - name: breathe-esg-db
    plan: free
